name: PSF Check
on:
  # Triggered manually — by Claude via GitHub API or from Actions tab
  # Never runs on schedule — this is an on-demand PSF position check
  # To trigger from Claude: say "PSF check" in the portfolio project chat
  workflow_dispatch:

jobs:
  psf-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run PSF check
        env:
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
        run: node psf-check.js
