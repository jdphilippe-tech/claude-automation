name: Daily Portfolio Check
on:
  schedule:
    - cron: '0 14 * * *'   # 14:00 UTC = 7:00 AM PDT  (summer)
                            # Change to '0 15 * * *' in November (PST)
                            # Change back to '0 14 * * *' in March (PDT)
  workflow_dispatch:        # Allows manual trigger from GitHub Actions UI
jobs:
  daily-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Test Lighter API (authenticated)
        env:
          LIGHTER_PRIVATE_KEY: ${{ secrets.LIGHTER_PRIVATE_KEY }}
          LIGHTER_PUBLIC_KEY: ${{ secrets.LIGHTER_PUBLIC_KEY }}
        run: |
          node -e "
          const crypto = require('crypto');
          const fetch = (...a) => import('node-fetch').then(({default:f}) => f(...a));
          const BASE        = 'https://mainnet.zklighter.elliot.ai';
          const ACCOUNT_IDX = 449217;
          const LLP_ID      = 281474976710654;
          const EDGE_ID     = 281474976688087;

          // Lighter auth token format (read-only):
          // ro:{account_index}:{single|all}:{expiry_unix}:{random_hex}
          // Then sign with ECDSA secp256k1 private key
          // But first — try the simpler approach: pass account_index as query param
          // Per docs the auth param can be the raw API key for some endpoints

          (async () => {
            const privKey = process.env.LIGHTER_PRIVATE_KEY;
            const pubKey  = process.env.LIGHTER_PUBLIC_KEY;
            console.log('Private key present:', !!privKey, 'length:', privKey?.length);
            console.log('Public key present:', !!pubKey, 'length:', pubKey?.length);
            console.log('Private key prefix:', privKey?.slice(0,10));

            // Try passing API keys directly as auth header (some endpoints accept this)
            const authHeader = pubKey + ':' + privKey;
            console.log('\n--- LLP metadata with auth header ---');
            const r1 = await (await fetch(
              BASE+'/api/v1/publicPoolsMetadata?index='+(LLP_ID+1)+'&limit=1',
              { headers: { 'Authorization': authHeader } }
            )).json();
            console.log(JSON.stringify(r1, null, 2));

            // Try auth as query param
            console.log('\n--- LLP metadata with auth query param ---');
            const r2 = await (await fetch(
              BASE+'/api/v1/publicPoolsMetadata?index='+(LLP_ID+1)+'&limit=1&auth='+encodeURIComponent(authHeader)
            )).json();
            console.log(JSON.stringify(r2, null, 2));

            // Try account endpoint with just public key as auth
            console.log('\n--- Account with public key auth ---');
            const r3 = await (await fetch(
              BASE+'/api/v1/account?account_index='+ACCOUNT_IDX,
              { headers: { 'Authorization': pubKey } }
            )).json();
            console.log(JSON.stringify(r3, null, 2).slice(0, 3000));

            // Try account endpoint with private key as auth
            console.log('\n--- Account with private key auth ---');
            const r4 = await (await fetch(
              BASE+'/api/v1/account?account_index='+ACCOUNT_IDX,
              { headers: { 'Authorization': privKey } }
            )).json();
            console.log(JSON.stringify(r4, null, 2).slice(0, 3000));

            // Search for staking pools by scanning a range of IDs
            console.log('\n--- Scan pool IDs near LIT (281474976624800) ---');
            const ids = [281474976624800, 281474976624801, 281474976624683, 281474976600000, 281474976700000];
            for (const id of ids) {
              const r = await (await fetch(BASE+'/api/v1/publicPoolsMetadata?index='+(id+1)+'&limit=1')).json();
              const pool = r?.public_pools?.[0];
              if (pool) console.log('id='+id+' name='+pool.name+' shares='+pool.total_shares+' value='+pool.total_asset_value);
            }
          })().catch(e => console.error('Error:', e.message));
          "
      - name: Run daily portfolio check
        env:
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}
          SOL_RPC_URL: ${{ secrets.SOL_RPC_URL }}
          RAYDIUM_DRY_RUN: ${{ vars.RAYDIUM_DRY_RUN }}
        run: node index.js
  morning-brief:
    runs-on: ubuntu-latest
    needs: daily-check
    if: github.event_name == 'schedule'
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Generate brief text via Claude API
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
        run: node scripts/generate-brief.mjs
      - name: Convert brief to audio via ElevenLabs
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        run: node scripts/morning-brief-audio.mjs
      - name: Update RSS feed
        env:
          REPO_URL: https://raw.githubusercontent.com/jdphilippe-tech/claude-automation/main
        run: node scripts/update-rss.mjs
      - name: Commit and push audio + RSS
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add audio/ feed.xml
          git commit -m "Morning brief $(date +%Y-%m-%d)"
          git push
