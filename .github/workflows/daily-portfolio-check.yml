name: Daily Portfolio Check
on:
  schedule:
    - cron: '0 14 * * *'   # 14:00 UTC = 7:00 AM PDT  (summer)
                            # Change to '0 15 * * *' in November (PST)
                            # Change back to '0 14 * * *' in March (PDT)
  workflow_dispatch:        # Allows manual trigger from GitHub Actions UI
jobs:
  daily-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Test Lighter API (read-only token)
        env:
          LIGHTER_READ_TOKEN: ${{ secrets.LIGHTER_READ_TOKEN }}
        run: |
          node -e "
          const fetch = (...a) => import('node-fetch').then(({default:f}) => f(...a));
          const BASE       = 'https://mainnet.zklighter.elliot.ai';
          const TOKEN      = process.env.LIGHTER_READ_TOKEN;
          const ACCOUNT    = 449217;
          const LLP_ID     = 281474976710654;
          const EDGE_ID    = 281474976688087;

          (async () => {
            const headers = { 'Authorization': TOKEN };

            // 1. Full account data with shares
            console.log('--- Account ---');
            const r1 = await (await fetch(BASE+'/api/v1/account?account_index='+ACCOUNT, { headers })).json();
            console.log(JSON.stringify(r1, null, 2).slice(0, 3000));

            // 2. LLP with auth — should return your share count
            console.log('\n--- LLP (authenticated) ---');
            const r2 = await (await fetch(BASE+'/api/v1/publicPoolsMetadata?index='+(LLP_ID+1)+'&limit=1', { headers })).json();
            console.log(JSON.stringify(r2, null, 2));

            // 3. Edge & Hedge with auth
            console.log('\n--- Edge & Hedge (authenticated) ---');
            const r3 = await (await fetch(BASE+'/api/v1/publicPoolsMetadata?index='+(EDGE_ID+1)+'&limit=1', { headers })).json();
            console.log(JSON.stringify(r3, null, 2));

            // 4. LIT staking — search for it by scanning pool IDs
            // LIT staking is native token staking, not a public pool
            // Try the staking endpoint directly
            console.log('\n--- Staking info ---');
            const r4 = await (await fetch(BASE+'/api/v1/accountMetadata?account_index='+ACCOUNT, { headers })).json();
            console.log(JSON.stringify(r4, null, 2).slice(0, 2000));
          })().catch(e => console.error('Error:', e.message));
          "
      - name: Run daily portfolio check
        env:
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}
          SOL_RPC_URL: ${{ secrets.SOL_RPC_URL }}
          RAYDIUM_DRY_RUN: ${{ vars.RAYDIUM_DRY_RUN }}
        run: node index.js
  morning-brief:
    runs-on: ubuntu-latest
    needs: daily-check
    if: github.event_name == 'schedule'
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Generate brief text via Claude API
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
        run: node scripts/generate-brief.mjs
      - name: Convert brief to audio via ElevenLabs
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        run: node scripts/morning-brief-audio.mjs
      - name: Update RSS feed
        env:
          REPO_URL: https://raw.githubusercontent.com/jdphilippe-tech/claude-automation/main
        run: node scripts/update-rss.mjs
      - name: Commit and push audio + RSS
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add audio/ feed.xml
          git commit -m "Morning brief $(date +%Y-%m-%d)"
          git push
