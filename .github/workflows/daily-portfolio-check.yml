name: Daily Portfolio Check
on:
  schedule:
    - cron: '0 14 * * *'   # 14:00 UTC = 7:00 AM PDT  (summer)
                            # Change to '0 15 * * *' in November (PST)
                            # Change back to '0 14 * * *' in March (PDT)
  workflow_dispatch:        # Allows manual trigger from GitHub Actions UI
jobs:
  daily-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Test Lighter API (shares + staking)
        env:
          LIGHTER_READ_TOKEN: ${{ secrets.LIGHTER_READ_TOKEN }}
        run: |
          node -e "
          const fetch = (...a) => import('node-fetch').then(({default:f}) => f(...a));
          const BASE    = 'https://mainnet.zklighter.elliot.ai';
          const TOKEN   = process.env.LIGHTER_READ_TOKEN;
          const ACCT    = 449217;
          const LLP_ID  = 281474976710654;
          const EDGE_ID = 281474976688087;
          const headers = { 'Authorization': TOKEN };

          (async () => {
            // 1. LLP with account_index — should return your shares
            console.log('--- LLP with account_index ---');
            const r1 = await (await fetch(
              BASE+'/api/v1/publicPoolsMetadata?index='+(LLP_ID+1)+'&limit=1&account_index='+ACCT,
              { headers }
            )).json();
            console.log(JSON.stringify(r1, null, 2));

            // 2. Edge & Hedge with account_index
            console.log('\n--- Edge & Hedge with account_index ---');
            const r2 = await (await fetch(
              BASE+'/api/v1/publicPoolsMetadata?index='+(EDGE_ID+1)+'&limit=1&account_index='+ACCT,
              { headers }
            )).json();
            console.log(JSON.stringify(r2, null, 2));

            // 3. Staking pools with filter=stake
            console.log('\n--- Staking pools (filter=stake) ---');
            const r3 = await (await fetch(
              BASE+'/api/v1/publicPoolsMetadata?index=0&limit=20&filter=stake',
              { headers }
            )).json();
            console.log(JSON.stringify(r3, null, 2));

            // 4. User pools with filter=user and account_index
            console.log('\n--- User pools (filter=user, account_index) ---');
            const r4 = await (await fetch(
              BASE+'/api/v1/publicPoolsMetadata?index=0&limit=20&filter=user&account_index='+ACCT,
              { headers }
            )).json();
            console.log(JSON.stringify(r4, null, 2));

            // 5. Filter=account_index — shows all pools this account has shares in
            console.log('\n--- filter=account_index ---');
            const r5 = await (await fetch(
              BASE+'/api/v1/publicPoolsMetadata?index=0&limit=20&filter=account_index&account_index='+ACCT,
              { headers }
            )).json();
            console.log(JSON.stringify(r5, null, 2));
          })().catch(e => console.error('Error:', e.message));
          "
      - name: Run daily portfolio check
        env:
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}
          SOL_RPC_URL: ${{ secrets.SOL_RPC_URL }}
          RAYDIUM_DRY_RUN: ${{ vars.RAYDIUM_DRY_RUN }}
        run: node index.js
  morning-brief:
    runs-on: ubuntu-latest
    needs: daily-check
    if: github.event_name == 'schedule'
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Generate brief text via Claude API
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
        run: node scripts/generate-brief.mjs
      - name: Convert brief to audio via ElevenLabs
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        run: node scripts/morning-brief-audio.mjs
      - name: Update RSS feed
        env:
          REPO_URL: https://raw.githubusercontent.com/jdphilippe-tech/claude-automation/main
        run: node scripts/update-rss.mjs
      - name: Commit and push audio + RSS
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add audio/ feed.xml
          git commit -m "Morning brief $(date +%Y-%m-%d)"
          git push
