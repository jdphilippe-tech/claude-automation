name: Daily Portfolio Check
on:
  # Cron is handled externally by cron-job.org which calls the workflow_dispatch
  # endpoint at 14:00 UTC (7:00 AM PDT) daily — far more reliable than GitHub's
  # built-in cron which can be delayed 1-3 hours during peak periods.
  # To trigger manually: Actions tab → Daily Portfolio Check → Run workflow
  workflow_dispatch:
jobs:
  daily-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Run daily portfolio check
        env:
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}
          SOL_RPC_URL: ${{ secrets.SOL_RPC_URL }}
          RAYDIUM_DRY_RUN: ${{ vars.RAYDIUM_DRY_RUN }}
          LIGHTER_READ_TOKEN: ${{ secrets.LIGHTER_READ_TOKEN }}
        run: node index.js
  morning-brief:
    runs-on: ubuntu-latest
    needs: daily-check
    # Runs when MORNING_BRIEF_ENABLED variable is 'true' — set in GitHub repo Variables.
    # Allows manual workflow_dispatch triggers without firing the brief.
    # cron-job.org triggers workflow_dispatch daily at 7 AM PDT with brief enabled.
    if: vars.MORNING_BRIEF_ENABLED == 'true'
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Generate brief text via Claude API
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
        run: node scripts/generate-brief.mjs
      - name: Convert brief to audio via ElevenLabs
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        run: node scripts/morning-brief-audio.mjs
      - name: Update RSS feed
        env:
          REPO_URL: https://raw.githubusercontent.com/jdphilippe-tech/claude-automation/main
        run: node scripts/update-rss.mjs
      - name: Commit and push audio + RSS
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add audio/ feed.xml
          git commit -m "Morning brief $(date +%Y-%m-%d)"
          git push
